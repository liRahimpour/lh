services:

  postgres:
    build: ../lh-dev-postgres
    container_name: lh-postgres
    ports:
      - "5432:5432"
    networks:
      - lh-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres-data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    container_name: lh-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - lh-network
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminadmin
    volumes:
      - minio-data:/data

  neo4j:
    image: neo4j:5-community
    container_name: lh-neo4j
    restart: unless-stopped
    ports:
      - "7474:7474"
      - "7687:7687"
    networks:
      - lh-network
    environment:
      NEO4J_AUTH: neo4j/adminadmin
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 512m
    volumes:
      - neo4j-data:/data
      - neo4j-logs:/logs

volumes:
  postgres-data:
  minio-data:
  neo4j-data:
  neo4j-logs:

networks:
  lh-network:
    external: true