services:

  backend:
    build: ../backend
    container_name: lh-backend
    ports:
      - "8081:8081"
    networks:
      - lh-network
    depends_on:
      - "postgres"

  postgres:
    build: ../lh-dev-postgres
    container_name: lh-postgres
    ports:
      - "5432:5432"
    networks:
      - lh-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${DATA_VOLUME}

  minio:
    image: minio/minio:latest
    container_name: lh-minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    networks:
      - lh-network
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: adminadmin
    volumes:
      - minio-data:/data


volumes:
  postgres-data:
  minio-data:

networks:
  lh-network:
    external: true