services:

  backend:
    build: ../backend
    container_name: lh-backend
    ports:
      - "8081:8081"
    networks:
      - lh-network
    depends_on:
      - "postgres"

  postgres:
    build: ../lh-dev-postgres
    container_name: lh-postgres
    ports:
      - "5432:5432"
    networks:
      - lh-network
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - ${DATA_VOLUME}

volumes:
  postgres-data:

networks:
  lh-network:
    external: true