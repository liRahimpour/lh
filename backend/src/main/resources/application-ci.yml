server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/legacyhub
    username: legacyhub
    password: legacyhub
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

legacyhub:
  storage:
    minio:
      endpoint: http://localhost:9000
      access-key: admin
      secret-key: adminadmin
      bucket: legacyhub

logging:
  level:
    root: INFO
    org.springframework.web: ERROR
    org.hibernate: ERROR