# TODO: compose application.yaml -> later should be in a separate file not default: application-compose.yaml

server:
  port: 8081

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/db}
    username: ${SPRING_DATASOURCE_USERNAME:admin}
    password: ${SPRING_DATASOURCE_PASSWORD:admin}
    driver-class-name: org.postgresql.Driver

  neo4j:
    uri: ${SPRING_NEO4J_URI:bolt://localhost:7687}
    authentication:
      username: ${SPRING_NEO4J_AUTHENTICATION_USERNAME:neo4j}
      password: ${SPRING_NEO4J_AUTHENTICATION_PASSWORD:adminadmin}

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

legacyhub:
  storage:
    minio:
      endpoint: ${LEGACYHUB_STORAGE_MINIO_ENDPOINT:http://localhost:9000}
      access-key: ${LEGACYHUB_STORAGE_MINIO_ACCESS_KEY:admin}
      secret-key: ${LEGACYHUB_STORAGE_MINIO_SECRET_KEY:adminadmin}
      bucket: ${LEGACYHUB_STORAGE_MINIO_BUCKET:legacyhub}

logging:
  level:
    root: INFO
    org.springframework.web: ERROR
    org.hibernate: ERROR
