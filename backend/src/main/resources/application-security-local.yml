
server:
  port: 8081

spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/db
    username: admin
    password: admin
    driver-class-name: org.postgresql.Driver

  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
      naming:
        physical-strategy: org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl
    show-sql: true

  flyway:
    enabled: true

  servlet:
    multipart:
      max-file-size: 100MB
      max-request-size: 100MB

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8082/realms/lh

legacyhub:
  storage:
    minio:
      endpoint: http://localhost:9000
      access-key: admin
      secret-key: adminadmin
      bucket: legacyhub
logging:
  level:
    root: INFO
    org.springframework.web: ERROR
    org.hibernate: ERROR
