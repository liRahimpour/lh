name: Backend CI

on:
  push:
    branches:
      - dev
      - main
      - feature/**
  pull_request:
    branches:
      - dev
      - main
      - feature/**

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    services:
      postgres: #Service container for PostgreSQL database
        image: postgres:16
        env:
          POSTGRES_USER: legacyhub
          POSTGRES_PASSWORD: legacyhub
          POSTGRES_DB: legacyhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U legacyhub -d legacyhub"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: backend # Set the working directory for the steps

    steps: # Steps for building and testing the backend
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21 # Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Build and test backend # Run the build and test command
        run: ./mvnw clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/legacyhub
          SPRING_DATASOURCE_USERNAME: legacyhub
          SPRING_DATASOURCE_PASSWORD: legacyhub