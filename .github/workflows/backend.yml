name: Backend CI

on:
  push:
    branches:
      - dev
      - main
      - "feature/**"
  pull_request:
    branches:
      - dev
      - main
      - "feature/**"

jobs:
  build-backend:
    name: Build Backend
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: legacyhub
          POSTGRES_PASSWORD: legacyhub
          POSTGRES_DB: legacyhub
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U legacyhub -d legacyhub"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      minio:
        image: minio/minio:latest
        env:
          MINIO_ROOT_USER: admin
          MINIO_ROOT_PASSWORD: adminadmin
        ports:
          - 9000:9000
          - 9001:9001
        options: >-
          --health-cmd="curl -f http://localhost:9000/minio/health/live || exit 1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
        command: server /data --console-address ":9001"

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6.0.3

      - name: Set up Java 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Create MinIO bucket
        run: |
          docker run --rm --network host minio/mc:latest \
            alias set local http://localhost:9000 admin adminadmin

          docker run --rm --network host minio/mc:latest \
            mb --ignore-existing local/legacyhub

      - name: Build and test backend
        run: ./mvnw clean verify
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/legacyhub
          SPRING_DATASOURCE_USERNAME: legacyhub
          SPRING_DATASOURCE_PASSWORD: legacyhub

          # Object Storage / MinIO
          MINIO_ENDPOINT: http://localhost:9000
          MINIO_ACCESS_KEY: admin
          MINIO_SECRET_KEY: adminadmin
          MINIO_BUCKET: legacyhub